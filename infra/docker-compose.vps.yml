# Apex Studio — VPS Deployment (System-level Nginx)
# Services are exposed on non-conflicting ports for system Nginx to proxy to.

services:
  postgres:
    image: postgres:16-alpine
    container_name: apex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex}
      POSTGRES_DB: ${POSTGRES_DB:-apex_studio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - apex_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex} -d ${POSTGRES_DB:-apex_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - apex_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: apex-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - apex_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: apex-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8000"   # Only accessible locally, system Nginx proxies to it
    env_file:
      - ../.env
    environment:
      APP_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-data:/app/workspaces
    networks:
      - apex_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: apex-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8084:80"     # Only accessible locally, system Nginx proxies to it
    networks:
      - apex_network
    depends_on:
      - backend

networks:
  apex_network:
    name: apex_network
    driver: bridge

volumes:
  pgdata:
  redis-data:
  minio-data:
  workspace-data:
