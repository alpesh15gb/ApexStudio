# Apex Studio — VPS Nginx Config (HTTP only, no SSL)
# Use this for IP-based deployment. Switch to nginx.conf once you have a domain.

upstream backend_api {
    server apex-backend:8000;
}

upstream frontend_app {
    server apex-frontend:80;
}

server {
    listen 80;
    server_name _;

    # 502 handling — show friendly page if backend is restarting
    error_page 502 503 504 /maintenance.html;

    # Health check
    location /api/v1/health {
        proxy_pass http://backend_api/api/v1/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
    }

    # API v1
    location /api/v1/ {
        proxy_pass http://backend_api/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API docs
    location /docs {
        proxy_pass http://backend_api/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend_api/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend_api/openapi.json;
        proxy_set_header Host $host;
    }

    # WebSocket for Chat
    location /ws/ {
        proxy_pass http://backend_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # WebSocket for Terminal
    location /ws/terminal/ {
        proxy_pass http://backend_api/ws/terminal/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # WebSocket for Logs
    location /ws/logs/ {
        proxy_pass http://backend_api/ws/logs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Workspace Runtime API
    location /api/v1/workspace-runtime/ {
        proxy_pass http://backend_api/api/v1/workspace-runtime/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Project Preview — route to workspace containers
    # /p/{project_slug}/ -> workspace frontend
    location ~ ^/p/([^/]+)/(.*)$ {
        set $project_slug $1;
        set $project_path $2;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://workspace_$project_slug:80/$project_path;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Workspace API proxy
    location ~ ^/_/api/([^/]+)/(.*)$ {
        set $project_slug $1;
        set $api_path $2;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://workspace_$project_slug:8000/$api_path;
        proxy_set_header Host $host;
    }

    # Flutter Frontend (SPA)
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Flutter SPA needs these timeouts for initial load
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
