# Apex Studio — System Nginx Configuration
# Place this in /etc/nginx/sites-available/apex-studio
# Then: ln -s /etc/nginx/sites-available/apex-studio /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

upstream apex_backend {
    server 127.0.0.1:8000;
}

upstream apex_frontend {
    server 127.0.0.1:8080;
}

# Redirect HTTP to HTTPS (enable once SSL is set up)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50M;

    # ---- API Routes ----

    location /api/v1/health {
        proxy_pass http://apex_backend/api/v1/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
    }

    location /api/v1/ {
        proxy_pass http://apex_backend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API docs
    location /docs {
        proxy_pass http://apex_backend/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://apex_backend/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://apex_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # ---- WebSocket Routes ----

    location /ws/ {
        proxy_pass http://apex_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Workspace Runtime ----

    location /api/v1/workspace-runtime/ {
        proxy_pass http://apex_backend/api/v1/workspace-runtime/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ---- Frontend (Flutter SPA) ----

    location / {
        proxy_pass http://apex_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }
}
